include:
  - project: 'flomation/infrastructure/ci-templates'
    ref: main
    file: '.gitlab-ci-templates.yml'

stages:
  - prepare
  - test
  - build
  - rpm-publish
  - deb-publish
  - publish
  - Development
  - Production
  - docker-prepare
  - docker-version
  - docker-build

variables:
  VERSION: 0.0.${CI_PIPELINE_IID}
  NAME: runner
  AWS_ACCESS_KEY_ID: ${GITLAB_AWS_USER_KEY}
  AWS_SECRET_ACCESS_KEY: ${GITLAB_AWS_USER_SECRET}
  AWS_DEFAULT_REGION: eu-west-2
  DEPLOY_BUCKET: ${AWS_DEPLOYMENT_BUCKET}
  HARBOR_IMAGE_PATH: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}
  CI_TEMPLATES_PROJECT: flomation/infrastructure/ci-templates

inject-metadata:
  extends: .inject-metadata-template

lint:
  stage: prepare
  script:
    - make lint

compile:
  stage: build
  script:
    - make build
  artifacts:
    paths:
      - ./build.zip
      - ./dist/application
    expire_in: 1 hour
  cache:
    policy: push
    paths:
      - ./build.zip

build-rpm-8:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:8
  variables:
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
#    APPLICATION_BINARY: "flomation-runner-amd64-linux*"
#    ARCH: x86_64
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el8*.rpm
    expire_in: 30 days

build-rpm-9:
  extends: .build-rpm-template
  image: rockylinux/rockylinux:9
  variables:
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
#    APPLICATION_BINARY: "flomation-runner-amd64-linux*"
#    ARCH: x86_64
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}-*el9*.rpm
    expire_in: 30 days

build-deb:
  extends: .build-deb-template
  variables:
    CI_TEMPLATES_REF: "main"
#    APPLICATION_BINARY: "flomation-runner-amd64-linux*"
#    ARCH: x86_64
  needs:
    - inject-metadata
    - compile
  artifacts:
    paths:
      - ${PACKAGE_NAME}_*.deb
    expire_in: 30 days

publish:
  stage: publish
  only:
    - main
  script:
    - aws s3 cp build.zip s3://${DEPLOY_BUCKET}/${NAME}/${CI_PIPELINE_IID}.zip
    - aws s3 cp build.zip s3://${DEPLOY_BUCKET}/${NAME}/latest.zip
  cache:
    policy: pull
    paths:
      - ./build.zip

publish-rpm-8:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el8*.rpm"
    EL_VERSION: "8"
    CI_TEMPLATES_REF: "main"
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-8

publish-rpm-9:
  extends: .publish-rpm-template
  variables:
    RPM_FILE_PATTERN: "${PACKAGE_NAME}-*el9*.rpm"
    EL_VERSION: "9"
    CI_TEMPLATES_REF: "main"
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-rpm-9

publish-deb:
  extends: .publish-deb-template
  variables:
    DEB_FILE_PATTERN: "${PACKAGE_NAME}_*.deb"
    CI_TEMPLATES_REF: "main"
    S3_ACCESS_KEY_PARAM: ${S3_ACCESS_KEY_PARAM_DEV}
    S3_SECRET_KEY_PARAM: ${S3_SECRET_KEY_PARAM_DEV}
  needs:
    - build-deb

Deploy to DEV:
  stage: Development
  variables:
    ENVIRONMENT: dev
  only:
    - main
  script:
    - aws s3 cp s3://${DEPLOY_BUCKET}/deploy-application-aws.sh .
    - chmod +x deploy-application-aws.sh
    - ENVIRONMENT=${ENVIRONMENT} APPLICATION=${NAME} ./deploy-application-aws.sh

Deploy to Live:
  stage: Production
  when: manual
  variables:
    ENVIRONMENT: live
  only:
    - main
  script:
    - aws s3 cp s3://${DEPLOY_BUCKET}/deploy-application-aws.sh .
    - chmod +x deploy-application-aws.sh
    - ENVIRONMENT=${ENVIRONMENT} APPLICATION=${NAME} ./deploy-application-aws.sh

docker-prepare:
  stage: docker-prepare
  image: amazon/aws-cli:latest
  only:
    - main
  script:
    - echo "Downloading latest runner zip from S3..."
    - aws s3 cp s3://${DEPLOY_BUCKET}/${NAME}/latest.zip ./latest.zip
    - ls -lh latest.zip
  artifacts:
    paths:
      - latest.zip
    expire_in: 1 hour

# Calculate next version number from Harbor
docker-version:
  stage: docker-version
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "Getting latest version from Harbor..."
    # Check if credentials are set
    - |
    - if [ -z "${GITLAB_HARBOR_USER}" ]; then
    - echo "ERROR - GITLAB_HARBOR_USER is not set!"
    - exit 1
    - fi
    - |
    - if [ -z "${GITLAB_HARBOR_PASSWORD}" ]; then
    - echo "ERROR - GITLAB_HARBOR_PASSWORD is not set!"
    - exit 1
    - fi

    - echo "Credentials are set, querying Harbor API..."
    - |
      LATEST_TAG=$(curl -k -s -u "${GITLAB_HARBOR_USER}:${GITLAB_HARBOR_PASSWORD}" \
        "https://${HARBOR_REGISTRY}/api/v2.0/projects/${HARBOR_PROJECT}/repositories/${IMAGE_NAME}/artifacts?page=1&page_size=100" \
        | jq -r '.[].tags[]?.name // empty' \
        | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
        | sort -V \
        | tail -1)

    - echo "Latest tag from Harbor -  ${LATEST_TAG}"

    - |
      if [ -z "$LATEST_TAG" ]; then
        echo "No existing semantic version tags found. Starting at 0.0.1"
        NEW_TAG="0.0.1"
      else
        echo "Latest tag found: ${LATEST_TAG}"
      
        # Split version using sh-compatible method
        major=$(echo "$LATEST_TAG" | cut -d. -f1)
        minor=$(echo "$LATEST_TAG" | cut -d. -f2)
        patch=$(echo "$LATEST_TAG" | cut -d. -f3)
      
        echo "Parsed version - Major: ${major}, Minor: ${minor}, Patch: ${patch}"
      
        NEW_TAG="${major}.${minor}.${CI_PIPELINE_IID}"
      fi

    - echo "New version will be - ${NEW_TAG}"
    - echo "NEW_TAG=${NEW_TAG}" > version.env
    - cat version.env
  artifacts:
    reports:
      dotenv: version.env
    expire_in: 1 hour

docker-build:
  stage: docker-build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  only:
    - main
  dependencies:
    - docker-prepare
    - docker-version
  before_script:
    # Verify files are present
    - echo "Checking for required files..."
    - ls -lh latest.zip || echo "ERROR -  latest.zip not found"
    - echo "Version to build - ${NEW_TAG}"

    # Setup Kaniko auth for Harbor
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "${HARBOR_REGISTRY}": {
            "auth": "$(printf '%s:%s' "${GITLAB_HARBOR_USER}" "${GITLAB_HARBOR_PASSWORD}" | base64 | tr -d '\n')"
          }
        }
      }
      EOF
    - echo "Kaniko authentication configured"

  script:
    - echo "Building and pushing Docker image..."
    - echo "Image path - ${HARBOR_IMAGE_PATH}"
    - echo "Tags - ${NEW_TAG} and latest"
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "Dockerfile" \
        --destination "${HARBOR_IMAGE_PATH}:${NEW_TAG}" \
        --destination "${HARBOR_IMAGE_PATH}:latest" \
        --skip-tls-verify \
        --cache=true \
        --cache-ttl=24h \
        --verbosity=info